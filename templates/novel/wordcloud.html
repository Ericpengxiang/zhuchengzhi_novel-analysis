{% extends 'novel/base.html' %}
{% load static %}

{% block title %} - 小说词云图{% endblock %}

{% block extra_css %}{% endblock %}

{% block content %}
      <header class="main-header">
        <div class="main-title">数据词云图</div>
        <div class="main-header-right">
          <span>当前账号：<span data-fake-user></span></span>
          <div class="avatar"></div>
        </div>
      </header>

      <section class="main-body">
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">小说词云图</div>
              <div class="panel-subtitle">从爬取的小说标题和简介中拆分出的高频词。</div>
            </div>
          </div>
          <div id="chart-wordcloud" class="chart-large" style="height:520px;">
            <div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);">加载中...</div>
          </div>
        </div>
      </section>
{% endblock %}

{% block extra_js %}
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
  <script>
    let wordcloudChart;

    // 加载词云图数据
    async function loadWordcloud() {
      try {
        const result = await getWordcloudData();
        
        if (result.code === 200 && result.data && result.data.words) {
          const words = result.data.words;
          
          if (words.length === 0) {
            document.getElementById('chart-wordcloud').innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);">暂无数据</div>';
            return;
          }
          
          renderWordcloud(words);
        } else {
          console.error('加载词云图数据失败:', result.message);
          document.getElementById('chart-wordcloud').innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);">加载失败：' + (result.message || '未知错误') + '</div>';
        }
      } catch (error) {
        console.error('加载词云图数据失败:', error);
        document.getElementById('chart-wordcloud').innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.6);">加载失败，请刷新重试</div>';
      }
    }

    // 渲染词云图
    function renderWordcloud(words) {
      wordcloudChart = echarts.init(document.getElementById('chart-wordcloud'));
      
      wordcloudChart.setOption({
        tooltip: { 
          show: true,
          formatter: function(params) {
            return params.name + '<br/>出现次数: ' + params.value;
          }
        },
        series: [
          {
            type: 'wordCloud',
            gridSize: 8,
            sizeRange: [14, 72],
            rotationRange: [-45, 45],
            shape: 'circle',
            width: '100%',
            height: '100%',
            textStyle: {
              color: function() {
                const colors = ['#ffee58', '#ff6ec7', '#40c4ff', '#b39ddb', '#69f0ae', '#ff8a65', '#ff4baf', '#6e9bff'];
                return colors[Math.floor(Math.random() * colors.length)];
              }
            },
            emphasis: {
              textStyle: {
                shadowBlur: 10,
                shadowColor: '#fff'
              }
            },
            data: words
          }
        ]
      });
    }

    // 响应式调整
    window.addEventListener('resize', function() {
      if (wordcloudChart) wordcloudChart.resize();
    });

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', function() {
      loadWordcloud();
    });
  </script>
{% endblock %}
