{% extends 'novel/base.html' %}
{% load static %}

{% block title %} - 个人信息修改{% endblock %}

{% block content %}
      <header class="main-header">
        <div class="main-title">我的信息</div>
        <div class="main-header-right">
          <span>当前账号：<span data-fake-user></span></span>
          <div class="avatar"></div>
        </div>
      </header>

      <section class="main-body">
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">修改个人信息</div>
              <div class="panel-subtitle">在此编辑昵称与登录密码，所有操作仅为假数据演示。</div>
            </div>
          </div>

          <form id="profileForm">
            <div class="form-row">
              <div class="form-label">用户名</div>
              <div class="form-field">
                <input class="input" type="text" name="username" id="username" value="" />
                <div class="helper-text">用于登录及展示，不允许为空。</div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">原密码</div>
              <div class="form-field">
                <input class="input" type="password" name="oldPassword" placeholder="请输入原密码" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">新密码</div>
              <div class="form-field">
                <input class="input" type="password" name="newPassword" placeholder="请输入新密码" />
                <div class="helper-text">推荐长度 6-18 位，支持字母数字组合，这里仅做形式校验。</div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-label">确认密码</div>
              <div class="form-field">
                <input class="input" type="password" name="confirmPassword" placeholder="请再次输入新密码" />
              </div>
            </div>

            <div id="profileError" class="error-text" style="display:none;"></div>

            <div class="mt-3">
              <button type="submit" class="btn-primary">提交</button>
            </div>
          </form>
        </div>
      </section>
{% endblock %}

{% block extra_js %}
  <script>
    (function () {
      // 加载用户信息
      fetch('/api/novel/auth/info/', {
        credentials: 'include'
      })
      .then(response => response.json())
      .then(result => {
        if (result.code === 200 && result.data) {
          const usernameInput = document.getElementById('username');
          if (usernameInput) {
            usernameInput.value = result.data.nickname || result.data.username || '';
          }
        }
      })
      .catch(() => {
        console.log('获取用户信息失败');
      });

      const form = document.getElementById("profileForm");
      const errorEl = document.getElementById("profileError");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errorEl.style.display = "none";
        errorEl.textContent = "";

        const username = form.username.value.trim();
        const oldPassword = form.oldPassword.value.trim();
        const newPassword = form.newPassword.value.trim();
        const confirmPassword = form.confirmPassword.value.trim();

        if (!username) {
          return showError("用户名不能为空。");
        }

        if (!oldPassword || !newPassword || !confirmPassword) {
          return showError("请完整填写原密码、新密码和确认密码。");
        }

        if (newPassword.length < 6) {
          return showError("新密码长度至少为 6 位。");
        }

        if (newPassword !== confirmPassword) {
          return showError("两次输入的新密码不一致。");
        }

        // 调用后端API更新用户信息
        fetch('/api/novel/auth/update/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({
            username: username,
            old_password: oldPassword,
            new_password: newPassword
          })
        })
        .then(response => response.json())
        .then(result => {
          if (result.code === 200) {
            alert("修改成功！");
            form.oldPassword.value = "";
            form.newPassword.value = "";
            form.confirmPassword.value = "";
          } else {
            showError(result.message || "修改失败");
          }
        })
        .catch(error => {
          console.error("修改失败:", error);
          showError("网络错误，请检查服务器是否启动");
        });
      });

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
      }
    })();
  </script>
{% endblock %}
